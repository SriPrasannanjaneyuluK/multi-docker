name: Deploy MultiDocker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: action/checkout@v3
      - run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - run: docker run -e CI=true bymywheels/react-test npm test
      
      - run: docker build -t bymywheels/multi-client ./client
      - run: docker build -t bymywheels/multi-nginx ./nginx
      - run: docker build -t bymywheels/multi-server ./server
      - run: docker build -t bymywheels/multi-worker ./worker

      - run: docker push bymywheels/multi-client
      - run: docker push bymywheels/multi-nginx
      - run: docker push bymywheels/multi-server
      - run: docker push bymywheels/multi-worker

